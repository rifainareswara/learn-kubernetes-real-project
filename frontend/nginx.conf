# =============================================================================
# Nginx Configuration — Svelte SPA + API Proxy
# =============================================================================
#
# Konfigurasi ini melakukan 2 hal:
#   1. Serve static files (Svelte build output)
#   2. Proxy /api/* dan /health ke backend service
#
# Di Kubernetes, backend-service adalah nama DNS internal
# yang otomatis dibuat oleh Kubernetes Service.
# =============================================================================

server {
    listen 80;
    server_name _;

    # ── Static Files (Svelte SPA) ────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA Routing: semua route yang bukan file, arahkan ke index.html
    # Ini penting agar client-side routing berfungsi
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ────────────────────────────────────────────────────────
    # Proxy semua request /api/* ke backend service
    # Di Kubernetes: backend-service.taskmanager.svc.cluster.local:3000
    # Di Docker Compose: backend:3000
    location /api/ {
        # BACKEND_URL di-set via environment variable atau default
        proxy_pass http://${BACKEND_HOST}:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint juga proxy ke backend
    location /health {
        proxy_pass http://${BACKEND_HOST}:3000;
        proxy_set_header Host $host;
    }

    # Swagger UI proxy ke backend
    location /swagger-ui {
        proxy_pass http://${BACKEND_HOST}:3000;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://${BACKEND_HOST}:3000;
        proxy_set_header Host $host;
    }

    # ── Cache Headers ────────────────────────────────────────────────────
    # Cache static assets agresif (Vite menambahkan hash ke filename)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Jangan cache index.html (agar update langsung terlihat)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
