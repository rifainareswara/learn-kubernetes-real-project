# =============================================================================
# Secret — Data Sensitif (Terenkripsi)
# =============================================================================
#
# 📝 PENJELASAN:
# Secret menyimpan data SENSITIF: password, API key, JWT secret.
# Data di-encode dengan base64 (BUKAN enkripsi! Hanya encoding).
#
# ⚠️  PENTING:
# - JANGAN commit file ini ke Git dengan data asli!
# - Di production, gunakan tools seperti:
#   - Google Secret Manager
#   - HashiCorp Vault
#   - Sealed Secrets
#
# Cara encode base64:
#   echo -n "data-kamu" | base64
#
# Cara decode:
#   echo "ZGF0YS1rYW11" | base64 --decode
#
# Apply:  kubectl apply -f k8s/secret.yaml
# Cek:    kubectl get secret -n taskmanager
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: taskmanager-secret
  namespace: taskmanager
  labels:
    app: taskmanager
# Opaque = tipe default, bisa simpan key-value apapun
type: Opaque
data:
  # ── Database Credentials ───────────────────────────────────────────────
  # echo -n "postgres" | base64
  DB_USER: cG9zdGdyZXM=
  # echo -n "postgres123" | base64
  DB_PASSWORD: cG9zdGdyZXMxMjM=

  # ── JWT Secret ─────────────────────────────────────────────────────────
  # echo -n "super-secret-jwt-key-change-this" | base64
  JWT_SECRET: c3VwZXItc2VjcmV0LWp3dC1rZXktY2hhbmdlLXRoaXM=

  # ── Full DATABASE_URL (composed from parts above) ──────────────────────
  # echo -n "postgres://postgres:postgres123@postgres-service:5432/taskmanager" | base64
  DATABASE_URL: cG9zdGdyZXM6Ly9wb3N0Z3Jlczpwb3N0Z3JlczEyM0Bwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvdGFza21hbmFnZXI=
