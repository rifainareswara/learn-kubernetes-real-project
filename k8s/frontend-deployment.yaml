# =============================================================================
# Frontend Deployment — Svelte + Nginx
# =============================================================================
#
# 📝 PENJELASAN:
# Sama seperti backend deployment, tapi untuk frontend.
# Frontend di-serve oleh Nginx yang juga berfungsi sebagai reverse proxy
# ke backend service.
#
# Apply:  kubectl apply -f k8s/frontend-deployment.yaml
# Cek:    kubectl get deployment -n taskmanager
#         kubectl get pods -n taskmanager -l component=frontend
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: taskmanager
  labels:
    app: taskmanager
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: taskmanager
        component: frontend
    spec:
      containers:
        - name: frontend
          # ⚠️ GANTI dengan image kamu di Artifact Registry!
          image: REGION-docker.pkg.dev/PROJECT_ID/taskmanager/frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80
              name: http

          # Environment variable untuk Nginx proxy
          env:
            - name: BACKEND_HOST
              # Nama DNS internal dari backend service
              value: "backend-service"

          # ── Health Checks ──────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # ── Resource Limits ────────────────────────────────────────────
          # Nginx sangat ringan, tidak butuh banyak resource
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
